<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latent Echo Node Archive (L.E.N.A.)</title>
    
    <!-- Ustawienia dla iPhone (Tryb Pełnoekranowy po dodaniu do Ekranu Początkowego) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="L.E.N.A.">
    
    <!-- Google Fonts: Courier Prime -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body>
    <div class="container">
        <!-- Flowers will be generated here by CSS/JS -->
    </div>

    <div class="audio-player">
        <div class="player-bg"></div>
        
        <div class="player-content">
            <button id="play-pause-btn" class="play-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            
            <div class="timeline">
                <div class="progress"></div>
            </div>
            
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio" src="assets/audio.mp3"></audio>

    <script src="script.js?v=2.1"></script>
</body>
</html>
